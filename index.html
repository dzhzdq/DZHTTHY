<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林山翔大帅哥</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a1a;
            --accent: #c9a962;
            --text: #f5f5f5;
            --bg: #0d0d0d;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 2rem;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .header h1 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 2.5rem;
            color: var(--accent);
            letter-spacing: 0.5rem;
            text-shadow: 0 2px 20px rgba(201, 169, 98, 0.3);
        }

        .gallery {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-container {
            position: relative;
            max-width: 85vw;
            max-height: 75vh;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .media-item {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .media-item.active {
            display: block;
        }

        .media-item img,
        .media-item video {
            max-width: 100%;
            max-height: 75vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .media-item video {
            width: auto;
            height: auto;
            max-width: 85vw;
            max-height: 75vh;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            background: rgba(201, 169, 98, 0.15);
            border: 1px solid rgba(201, 169, 98, 0.3);
            border-radius: 50%;
            color: var(--accent);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: rgba(201, 169, 98, 0.3);
            transform: translateY(-50%) scale(1.1);
        }

        .nav-btn.prev {
            left: 2rem;
        }

        .nav-btn.next {
            right: 2rem;
        }

        .counter {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.2rem;
        }

        .counter span {
            color: var(--accent);
        }

        .swipe-hint {
            position: fixed;
            bottom: 5rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
                letter-spacing: 0.3rem;
            }
            .nav-btn {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
            .nav-btn.prev { left: 1rem; }
            .nav-btn.next { right: 1rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>林山翔大帅哥</h1>
    </header>

    <div class="gallery" id="gallery">
        <button class="nav-btn prev" onclick="changeSlide(-1)">‹</button>
        
        <div class="media-container" id="mediaContainer">
        </div>
        
        <button class="nav-btn next" onclick="changeSlide(1)">›</button>
    </div>

    <div class="counter">
        <span id="currentIndex">1</span> / <span id="totalCount">0</span>
    </div>

    <div class="swipe-hint">← 左右滑动 →</div>

    <script>
        const mediaFiles = [
            { type: 'img', src: '照片/微信图片_20260408170021_31_4.jpg' },
            { type: 'img', src: '照片/微信图片_20260408170021_32_4.jpg' },
            { type: 'img', src: '照片/微信图片_20260408170022_33_4.jpg' },
            { type: 'img', src: '照片/微信图片_20260408170023_34_4.jpg' },
            { type: 'img', src: '照片/微信图片_20260408170024_35_4.jpg' },
            { type: 'img', src: '照片/微信图片_20260408170025_36_4.jpg' },
            { type: 'img', src: '照片/微信图片_20260408170256_37_4.jpg' },
            { type: 'img', src: '照片/微信图片_20260408170426_42_4.jpg' },
            { type: 'img', src: '照片/微信图片_20260408170450_44_4.jpg' },
            { type: 'img', src: '照片/微信图片_20260408170502_45_4.jpg' },
            { type: 'video', src: '照片/微信视频2026-04-08_170523_098.mp4' },
            { type: 'video', src: '照片/微信视频2026-04-08_170532_090.mp4' }
        ];

        let currentIndex = 0;
        const container = document.getElementById('mediaContainer');

        function initGallery() {
            mediaFiles.forEach((media, index) => {
                const div = document.createElement('div');
                div.className = 'media-item' + (index === 0 ? ' active' : '');
                
                if (media.type === 'img') {
                    div.innerHTML = `<img src="${media.src}" alt="照片 ${index + 1}">`;
                } else {
                    div.innerHTML = `<video src="${media.src}" controls></video>`;
                }
                
                container.appendChild(div);
            });
            
            document.getElementById('totalCount').textContent = mediaFiles.length;
        }

        function changeSlide(direction) {
            const items = document.querySelectorAll('.media-item');
            items[currentIndex].classList.remove('active');
            
            currentIndex = (currentIndex + direction + mediaFiles.length) % mediaFiles.length;
            
            items[currentIndex].classList.add('active');
            document.getElementById('currentIndex').textContent = currentIndex + 1;

            const currentMedia = items[currentIndex].querySelector('video');
            if (currentMedia) {
                currentMedia.currentTime = 0;
            }
        }

        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    changeSlide(1);
                } else {
                    changeSlide(-1);
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') changeSlide(1);
            if (e.key === 'ArrowLeft') changeSlide(-1);
        });

        initGallery();
    </script>
</body>
</html>
